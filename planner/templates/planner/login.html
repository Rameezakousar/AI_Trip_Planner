{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Trip Planner</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>✈ Welcome Back</h1>

        <p>Login to continue planning your dream trip.</p>

        {% if messages %}
            {% for message in messages %}
                <div style="
                    background:#fdecea;
                    color:#b71c1c;
                    padding:10px;
                    border-radius:8px;
                    margin-bottom:15px;
                    text-align:center;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <a href="/register/">
            Create New Account
        </a>

        <br><br>

        <a href="/">
            ⬅ Back to Home
        </a>

    </div>

</div>

</body>

</html>
