{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | AI Trip Planner</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .message-success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            margin: 15px 0;
            border-radius: 8px;
            text-align: center;
        }
    </style>

</head>

<body>

<div class="register-container">

    <div class="register-card">

        <h1>🌍 Create Your Account</h1>

        <p>Start planning amazing trips with AI.</p>

        {% if messages %}
            {% for message in messages %}
                <div style="background:#d4edda;
                            color:#155724;
                            padding:10px;
                            margin:15px 0;
                            border-radius:8px;
                            text-align:center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <br>

        <a href="/login/">Already have an account? Login</a>

        <br><br>

        <a href="/">⬅ Back to Home</a>

    </div>

</div>

</body>
</html>
